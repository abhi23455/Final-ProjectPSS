# docker-compose.yml
# Sesuai buku Chapter 10 Section 3.1
# Tambahan: Redis service + AOF persistence

version: '3.8'

services:

  # ==============================
  # PostgreSQL Database
  # ==============================
  database:
    image: postgres:15
    container_name: lms_database
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=simple_lms_db
      - POSTGRES_USER=lms_user
      - POSTGRES_PASSWORD=lms_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms_user -d simple_lms_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lms-network

  # ==============================
  # Django Application
  # ==============================
  web:
    build: .
    container_name: simple_lms
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - SECRET_KEY=django-insecure-development-key-that-is-long-enough-32-chars
      - DB_NAME=simple_lms_db
      - DB_USER=lms_user
      - DB_PASSWORD=lms_password
      - DB_HOST=database
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - MONGODB_URI=mongodb://mongodb:27017/lms_logs
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      mongodb:
        condition: service_started
    networks:
      - lms-network
    restart: unless-stopped

  # ==============================
  # Redis Cache
  # ==============================
  redis:
    image: redis:7-alpine
    container_name: lms_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - lms-network
    restart: unless-stopped

  # ==============================
  # MongoDB for Logs & Analytics
  # ==============================
  mongodb:
    image: mongo:6
    container_name: lms_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - lms-network
    restart: unless-stopped

  # ==============================
  # RabbitMQ Message Broker
  # ==============================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: lms_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - lms-network
    restart: unless-stopped

  # ==============================
  # Celery Worker
  # ==============================
  celery-worker:
    build: .
    container_name: lms_celery_worker
    command: celery -A config worker --loglevel=info -E
    volumes:
      - .:/app
    environment:
      - DEBUG=1
      - SECRET_KEY=django-insecure-development-key-that-is-long-enough-32-chars
      - DB_NAME=simple_lms_db
      - DB_USER=lms_user
      - DB_PASSWORD=lms_password
      - DB_HOST=database
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - MONGODB_URI=mongodb://mongodb:27017/lms_logs
    depends_on:
      - database
      - redis
      - rabbitmq
      - mongodb
    networks:
      - lms-network
    restart: unless-stopped

  # ==============================
  # Celery Beat Scheduler
  # ==============================
  celery-beat:
    build: .
    container_name: lms_celery_beat
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      - DEBUG=1
      - SECRET_KEY=django-insecure-development-key-that-is-long-enough-32-chars
      - DB_NAME=simple_lms_db
      - DB_USER=lms_user
      - DB_PASSWORD=lms_password
      - DB_HOST=database
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
    depends_on:
      - database
      - redis
      - rabbitmq
    networks:
      - lms-network
    restart: unless-stopped

  # ==============================
  # Flower - Celery Monitoring
  # ==============================
  flower:
    build: .
    container_name: lms_flower
    command: celery -A config flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
    depends_on:
      - rabbitmq
    networks:
      - lms-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  mongodb_data:

networks:
  lms-network:
    driver: bridge